<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="80" x2="1460" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFBF7"/>
      <stop offset="1" stop-color="#F1EEE6"/>
    </linearGradient>
    <linearGradient id="hero" x1="350" y1="140" x2="1250" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#155E75"/>
    </linearGradient>
    <linearGradient id="director" x1="470" y1="320" x2="1130" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="specialist" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F5EF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="980" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#163247" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <circle cx="170" cy="140" r="120" fill="#D9F99D" fill-opacity="0.35"/>
  <circle cx="1440" cy="190" r="150" fill="#BFDBFE" fill-opacity="0.35"/>
  <circle cx="1450" cy="860" r="180" fill="#FDE68A" fill-opacity="0.22"/>

  <text x="800" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#0F172A" letter-spacing="4">PAPERSFLOW</text>
  <text x="800" y="138" text-anchor="middle" font-family="Instrument Serif, Georgia, serif" font-size="62" fill="#111827">Research Org Chart</text>
  <text x="800" y="176" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" fill="#475569">A compact literature and evidence workflow company built on the hosted PapersFlow MCP surface.</text>

  <g filter="url(#shadow)">
    <rect x="555" y="215" rx="28" ry="28" width="490" height="132" fill="url(#hero)"/>
    <text x="800" y="264" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#CCFBF1" letter-spacing="2">EXECUTIVE</text>
    <text x="800" y="304" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">PapersFlow CEO</text>
    <text x="800" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#F0FDFA">Scopes work, routes requests, and frames final research outcomes.</text>

    <rect x="470" y="410" rx="28" ry="28" width="660" height="132" fill="url(#director)"/>
    <text x="800" y="459" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#DBEAFE" letter-spacing="2">COORDINATION</text>
    <text x="800" y="499" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF">Research Director</text>
    <text x="800" y="529" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#EFF6FF">Combines discovery, verification, DeepScan, and synthesis into one grounded workflow.</text>

    <rect x="105" y="635" rx="24" ry="24" width="300" height="156" fill="url(#specialist)"/>
    <rect x="105" y="635" rx="24" ry="24" width="300" height="156" stroke="#C7D2FE" stroke-width="2"/>
    <text x="255" y="680" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#4338CA" letter-spacing="2">DISCOVERY</text>
    <text x="255" y="720" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Literature Analyst</text>
    <text x="255" y="752" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Seed papers, graph expansion,</text>
    <text x="255" y="777" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">neighbors, and reading briefs.</text>

    <rect x="445" y="635" rx="24" ry="24" width="300" height="156" fill="url(#specialist)"/>
    <rect x="445" y="635" rx="24" ry="24" width="300" height="156" stroke="#99F6E4" stroke-width="2"/>
    <text x="595" y="680" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0F766E" letter-spacing="2">VERIFICATION</text>
    <text x="595" y="720" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Citation Specialist</text>
    <text x="595" y="752" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">DOI, arXiv, PubMed, URL,</text>
    <text x="595" y="777" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">and citation-string cleanup.</text>

    <rect x="785" y="635" rx="24" ry="24" width="300" height="156" fill="url(#specialist)"/>
    <rect x="785" y="635" rx="24" ry="24" width="300" height="156" stroke="#93C5FD" stroke-width="2"/>
    <text x="935" y="680" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1D4ED8" letter-spacing="2">ASYNC RESEARCH</text>
    <text x="935" y="720" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">DeepScan Operator</text>
    <text x="935" y="752" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Launches runs, monitors progress,</text>
    <text x="935" y="777" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">retrieves reports, and plots data.</text>

    <rect x="1125" y="635" rx="24" ry="24" width="370" height="156" fill="url(#specialist)"/>
    <rect x="1125" y="635" rx="24" ry="24" width="370" height="156" stroke="#FCD34D" stroke-width="2"/>
    <text x="1310" y="680" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#B45309" letter-spacing="2">EVIDENCE SYNTHESIS</text>
    <text x="1310" y="720" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">Evidence Synthesis Specialist</text>
    <text x="1310" y="752" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">Cross-run comparison, recurring themes,</text>
    <text x="1310" y="777" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#475569">gaps, and grounded summary notes.</text>

    <rect x="370" y="844" rx="24" ry="24" width="860" height="92" fill="#FFFDF8"/>
    <rect x="370" y="844" rx="24" ry="24" width="860" height="92" stroke="#E2E8F0" stroke-width="2"/>
    <text x="800" y="880" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0F766E" letter-spacing="2">SHARED MCP BACKBONE</text>
    <text x="800" y="910" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">Hosted PapersFlow MCP • Search • Citation Graph • Verify Citation • DeepScan • Plotting</text>
  </g>

  <path d="M800 347V410" stroke="#0F766E" stroke-width="5" stroke-linecap="round"/>
  <path d="M800 542V595" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
  <path d="M255 595H1310" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M255 595V635" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M595 595V635" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M935 595V635" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M1310 595V635" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M255 791V818H255H800V844" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M595 791V818" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M935 791V818" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
  <path d="M1310 791V818H800" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round"/>
</svg>
